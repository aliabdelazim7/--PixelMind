<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ليد فلو - نظام إدارة العملاء البسيط</title>
    <!-- Google Fonts: Cairo -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary: #0b0b0b;
            --bg-secondary: #121212;
            --bg-card: #181818;
            --border-color: #262626;
            --border-hover: #3a3a3a;
            --text-primary: #ffffff;
            --text-secondary: #a3a3a3;
            --text-muted: #666666;
            --accent-white: #ffffff;
            --accent-grey: #404040;
            --font-family: 'Cairo', sans-serif;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: var(--font-family);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            padding-bottom: 50px;
            text-align: right;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 30px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 30px;
        }

        .logo-section h1 {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 0.05em;
        }

        .logo-section p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .btn {
            background-color: var(--accent-white);
            color: #000;
            border: 1px solid var(--accent-white);
            padding: 8px 24px;
            font-size: 0.9rem;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            font-family: var(--font-family);
        }

        .btn:hover {
            background-color: transparent;
            color: var(--text-primary);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            font-weight: 600;
            padding: 8px 16px;
        }

        .btn-secondary:hover {
            background-color: var(--bg-secondary);
            border-color: var(--border-hover);
        }

        /* KPI Dashboard Grid */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .kpi-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 20px;
            text-align: center;
        }

        .kpi-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 600;
            margin-bottom: 6px;
        }

        .kpi-value {
            font-size: 2rem;
            font-weight: 800;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 8px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 24px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 12px 20px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: var(--transition);
            font-family: var(--font-family);
        }

        .tab-btn:hover {
            color: var(--text-primary);
        }

        .tab-btn.active {
            color: var(--text-primary);
            border-bottom-color: var(--accent-white);
            font-weight: 700;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Controls */
        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 16px;
        }

        .search-wrapper {
            flex: 1;
            max-width: 400px;
        }

        .search-input {
            width: 100%;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 16px;
            border-radius: 4px;
            font-size: 0.9rem;
            font-family: var(--font-family);
            outline: none;
        }

        .filter-wrapper {
            display: flex;
            gap: 12px;
        }

        .select-filter {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 16px;
            border-radius: 4px;
            font-size: 0.9rem;
            font-family: var(--font-family);
            outline: none;
            cursor: pointer;
        }

        /* Table */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--bg-card);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
            font-size: 0.95rem;
        }

        th {
            background-color: var(--bg-secondary);
            padding: 14px 18px;
            font-weight: 700;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
            font-size: 0.85rem;
        }

        td {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            vertical-align: middle;
        }

        tr:hover td {
            background-color: rgba(255,255,255,0.02);
        }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 700;
            border: 1px solid transparent;
        }

        .badge-newlead { background-color: rgba(248, 249, 250, 0.15); color: #f8f9fa; border-color: rgba(248, 249, 250, 0.3); }
        .badge-contacted { background-color: rgba(0, 123, 255, 0.15); color: #66b0ff; border-color: rgba(0, 123, 255, 0.3); }
        .badge-followuprequired { background-color: rgba(253, 126, 20, 0.15); color: #fdaa60; border-color: rgba(253, 126, 20, 0.3); }
        .badge-appointmentbooked { background-color: rgba(111, 66, 193, 0.15); color: #b78eff; border-color: rgba(111, 66, 193, 0.3); }
        .badge-proposalsent { background-color: rgba(232, 62, 140, 0.15); color: #f584b7; border-color: rgba(232, 62, 140, 0.3); }
        .badge-negotiating { background-color: rgba(255, 193, 7, 0.15); color: #ffe066; border-color: rgba(255, 193, 7, 0.3); }
        .badge-won { background-color: #ffffff; color: #000000; border-color: #ffffff; }
        .badge-lost { background-color: rgba(220, 53, 69, 0.15); color: #ff6b78; border-color: rgba(220, 53, 69, 0.3); }
        .badge-ghosted { background-color: rgba(108, 117, 125, 0.15); color: #888; border-color: rgba(108, 117, 125, 0.2); }
        .badge-notinterested { background-color: rgba(52, 58, 64, 0.15); color: #777; border-color: rgba(52, 58, 64, 0.2); }

        .wa-link {
            display: inline-flex;
            align-items: center;
            color: var(--text-primary);
            text-decoration: none;
            border: 1px solid var(--border-color);
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 700;
            transition: var(--transition);
            background-color: rgba(255,255,255,0.05);
        }

        .wa-link:hover {
            background-color: var(--accent-white);
            color: #000;
            border-color: var(--accent-white);
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            padding: 24px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.15rem;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.6rem;
            cursor: pointer;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        input, select {
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: 4px;
            font-size: 0.95rem;
            font-family: var(--font-family);
            outline: none;
            text-align: right;
            width: 100%;
        }

        input:focus, select:focus {
            border-color: var(--border-hover);
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
            margin-top: 15px;
        }

        /* Charts Layout */
        .chart-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 24px;
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }

        .chart-title {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 20px;
            text-align: center;
        }

        .chart-container {
            position: relative;
            flex: 1;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-section">
            <h1>ليد فلو</h1>
            <p>نظام إدارة ومتابعة العملاء فائق البساطة</p>
        </div>
        <div class="header-actions">
            <button class="btn btn-secondary" onclick="resetDefaultData()">إعادة تعيين البيانات</button>
            <button class="btn" onclick="openNewLeadModal()">+ إضافة عميل</button>
        </div>
    </header>

    <!-- KPI Dashboard -->
    <div class="kpi-grid" id="kpi-grid">
        <!-- Dynically filled -->
    </div>

    <!-- Navigation Tabs -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('leads')">قائمة العملاء</button>
        <button class="tab-btn" onclick="switchTab('charts')" id="charts-tab-btn">إحصائيات مراحل البيع</button>
    </div>

    <!-- TAB: Leads -->
    <div id="leads-tab" class="tab-content active">
        <div class="control-bar">
            <div class="search-wrapper">
                <input type="text" id="lead-search" class="search-input" placeholder="ابحث باسم العميل أو رقم الهاتف..." oninput="renderLeadsTable()">
            </div>
            <div class="filter-wrapper">
                <select id="status-filter" class="select-filter" onchange="renderLeadsTable()">
                    <option value="">كل الحالات</option>
                    <option value="New Lead">⚪ عميل جديد</option>
                    <option value="Contacted">🔵 تم الاتصال</option>
                    <option value="Follow Up Required">🟠 يحتاج متابعة</option>
                    <option value="Appointment Booked">📅 تم حجز موعد</option>
                    <option value="Proposal Sent">📄 تم إرسال العرض</option>
                    <option value="Negotiating">🟡 تفاوض</option>
                    <option value="Won">🟢 تم البيع</option>
                    <option value="Lost">🔴 خسرنا الصفقة</option>
                    <option value="Ghosted">⚫ لم يرد (اختفى)</option>
                    <option value="Not Interested">❌ غير مهتم</option>
                </select>
            </div>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>الاسم بالكامل</th>
                        <th>رقم الهاتف</th>
                        <th>مراسلة سريعة</th>
                        <th>حالة العميل</th>
                        <th>تاريخ الإضافة</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody id="leads-table-body">
                    <!-- Dynically filled -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- TAB: Charts -->
    <div id="charts-tab" class="tab-content">
        <div class="chart-card">
            <div class="chart-title">توزيع العملاء على مراحل البيع (القمح البيعي)</div>
            <div class="chart-container">
                <canvas id="funnelChart"></canvas>
            </div>
        </div>
    </div>
</div>

<!-- MODAL: Add Lead -->
<div class="modal-overlay" id="lead-modal">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title" id="lead-modal-title">إضافة عميل جديد</div>
            <button class="modal-close" onclick="closeLeadModal()">&times;</button>
        </div>
        <form id="lead-form" onsubmit="saveLead(event)">
            <input type="hidden" id="edit-lead-index">
            
            <div class="form-group">
                <label for="lead-fullname">اسم العميل بالكامل *</label>
                <input type="text" id="lead-fullname" required placeholder="أحمد محمد">
            </div>
            
            <div class="form-group">
                <label for="lead-phone">رقم الهاتف *</label>
                <input type="tel" id="lead-phone" required placeholder="201012345678+">
            </div>
            
            <div class="form-group">
                <label for="lead-status">حالة العميل</label>
                <select id="lead-status">
                    <option value="New Lead">⚪ عميل جديد</option>
                    <option value="Contacted">🔵 تم الاتصال</option>
                    <option value="Follow Up Required">🟠 يحتاج متابعة</option>
                    <option value="Appointment Booked">📅 تم حجز موعد</option>
                    <option value="Proposal Sent">📄 تم إرسال العرض</option>
                    <option value="Negotiating">🟡 تفاوض</option>
                    <option value="Won">🟢 تم البيع</option>
                    <option value="Lost">🔴 خسرنا الصفقة</option>
                    <option value="Ghosted">⚫ لم يرد (اختفى)</option>
                    <option value="Not Interested">❌ غير مهتم</option>
                </select>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeLeadModal()">إلغاء</button>
                <button type="submit" class="btn">حفظ</button>
            </div>
        </form>
    </div>
</div>

<!-- JS Core Logic -->
<script>
    const STATUS_BADGES = {
        'New Lead': 'badge-newlead',
        'Contacted': 'badge-contacted',
        'Follow Up Required': 'badge-followuprequired',
        'Appointment Booked': 'badge-appointmentbooked',
        'Proposal Sent': 'badge-proposalsent',
        'Negotiating': 'badge-negotiating',
        'Won': 'badge-won',
        'Lost': 'badge-lost',
        'Ghosted': 'badge-ghosted',
        'Not Interested': 'badge-notinterested'
    };

    const STATUS_LABELS = {
        'New Lead': '⚪ عميل جديد',
        'Contacted': '🔵 تم الاتصال',
        'Follow Up Required': '🟠 يحتاج متابعة',
        'Appointment Booked': '📅 تم حجز موعد',
        'Proposal Sent': '📄 تم إرسال العرض',
        'Negotiating': '🟡 تفاوض',
        'Won': '🟢 تم البيع',
        'Lost': '🔴 خسرنا الصفقة',
        'Ghosted': '⚫ لم يرد (اختفى)',
        'Not Interested': '❌ غير مهتم'
    };

    const DEFAULT_LEADS = [
        { fullname: "سارة الشافعي", phone: "201012345678", status: "New Lead", created_at: "2026-07-12" },
        { fullname: "خالد الحربي", phone: "966501234567", status: "Won", created_at: "2026-07-11" },
        { fullname: "أمين الهاشمي", phone: "9613123456", status: "Proposal Sent", created_at: "2026-07-10" }
    ];

    let leads = [];

    // رابط الويب الخاص بـ Google Apps Script للاتصال بالداتابيز مباشرة
    const webAppUrl = "https://script.google.com/macros/s/AKfycbwqZvTWBDj18_OQ7BIZFv6qPeKaK6FzClh2ddHnERhpy5LJtyiTSETdT_BUfVXks1ELlg/exec";

    // التحقق مما إذا كان التطبيق يعمل داخل بيئة Google Apps Script
    const isGoogleAppsScript = typeof google !== 'undefined' && google.script && google.script.run;

    function initData() {
        if (isGoogleAppsScript) {
            // جلب البيانات من شيت جوجل مباشرة داخل بيئة جوجل
            google.script.run.withSuccessHandler(function(data) {
                leads = data;
                calculateKPIs();
                renderLeadsTable();
            }).getLeads();
        } else {
            // جلب البيانات من الـ Web App الخاص بجوجل عبر الـ API للتشغيل الخارجي
            fetch(webAppUrl + "?action=getLeads")
                .then(res => res.json())
                .then(data => {
                    leads = data;
                    calculateKPIs();
                    renderLeadsTable();
                })
                .catch(err => {
                    console.warn("تنبيه: فشل الاتصال بالـ API، سيتم تشغيل التخزين المحلي الاحتياطي:", err);
                    if (!localStorage.getItem('meta_crm_leads_minimal')) {
                        localStorage.setItem('meta_crm_leads_minimal', JSON.stringify(DEFAULT_LEADS));
                    }
                    leads = JSON.parse(localStorage.getItem('meta_crm_leads_minimal'));
                    calculateKPIs();
                    renderLeadsTable();
                });
        }
    }

    function resetDefaultData() {
        if (isGoogleAppsScript) {
            alert("إعادة التعيين غير متاحة في بيئة شيت جوجل المباشرة.");
        } else {
            localStorage.removeItem('meta_crm_leads_minimal');
            initData();
            renderCharts();
        }
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

        const activeBtn = Array.from(document.querySelectorAll('.tab-btn')).find(btn => btn.getAttribute('onclick').includes(tabId));
        if (activeBtn) activeBtn.classList.add('active');

        document.getElementById(`${tabId}-tab`).classList.add('active');

        if (tabId === 'charts') {
            renderCharts();
        }
    }

    function calculateKPIs() {
        const totalLeads = leads.length;
        const won = leads.filter(l => l.status === 'Won').length;
        const active = leads.filter(l => !['Won', 'Lost', 'Not Interested'].includes(l.status)).length;

        const container = document.getElementById('kpi-grid');
        container.innerHTML = `
            <div class="kpi-card">
                <div class="kpi-label">إجمالي العملاء</div>
                <div class="kpi-value">${totalLeads}</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">عملاء تحت المتابعة النشطة</div>
                <div class="kpi-value">${active}</div>
            </div>
            <div class="kpi-card">
                <div class="kpi-label">العملاء المقبولين (Won)</div>
                <div class="kpi-value">${won}</div>
            </div>
        `;
    }

    function renderLeadsTable() {
        const query = document.getElementById('lead-search').value.toLowerCase();
        const statusFilter = document.getElementById('status-filter').value;
        const tbody = document.getElementById('leads-table-body');
        tbody.innerHTML = '';

        leads.forEach((l, index) => {
            const matchQuery = l.fullname.toLowerCase().includes(query) || l.phone.includes(query);
            const matchStatus = !statusFilter || l.status === statusFilter;

            if (matchQuery && matchStatus) {
                const phoneClean = l.phone.replace(/[\+\s\-\(\)]/g, '');
                const waUrl = `https://wa.me/${phoneClean}`;

                tbody.innerHTML += `
                    <tr>
                        <td style="font-weight: 700;">${l.fullname}</td>
                        <td style="direction: ltr; text-align: right;">${l.phone}</td>
                        <td><a href="${waUrl}" target="_blank" class="wa-link">📱 واتساب</a></td>
                        <td><span class="badge ${STATUS_BADGES[l.status] || 'badge-newlead'}">${STATUS_LABELS[l.status] || l.status}</span></td>
                        <td>${l.created_at}</td>
                        <td>
                            <div class="action-row">
                                <button class="btn btn-secondary" style="padding: 4px 10px; font-size: 0.8rem;" onclick="openEditLeadModal(${index})">تعديل الحالة</button>
                                <button class="btn btn-secondary" style="padding: 4px 10px; font-size: 0.8rem; color: #ff5252; border-color: rgba(220,53,69,0.2);" onclick="deleteLead(${index})">حذف</button>
                            </div>
                        </td>
                    </tr>
                `;
            }
        });
    }

    function openNewLeadModal() {
        document.getElementById('lead-modal-title').innerText = "إضافة عميل جديد";
        document.getElementById('lead-form').reset();
        document.getElementById('edit-lead-index').value = "";
        document.getElementById('lead-modal').classList.add('active');
    }

    function openEditLeadModal(index) {
        const l = leads[index];
        document.getElementById('lead-modal-title').innerText = "تعديل حالة العميل";
        document.getElementById('edit-lead-index').value = index;

        document.getElementById('lead-fullname').value = l.fullname;
        document.getElementById('lead-phone').value = l.phone;
        document.getElementById('lead-status').value = l.status;

        document.getElementById('lead-modal').classList.add('active');
    }

    function closeLeadModal() {
        document.getElementById('lead-modal').classList.remove('active');
    }

    function saveLead(e) {
        e.preventDefault();
        const indexStr = document.getElementById('edit-lead-index').value;

        const newLead = {
            fullname: document.getElementById('lead-fullname').value,
            phone: document.getElementById('lead-phone').value,
            status: document.getElementById('lead-status').value
        };

        if (isGoogleAppsScript) {
            // حفظ البيانات في شيت جوجل مباشرة داخل بيئة جوجل
            if (indexStr !== "") {
                const idx = parseInt(indexStr);
                newLead.rowIndex = leads[idx].rowIndex;
            }
            google.script.run.withSuccessHandler(function(updatedLeads) {
                leads = updatedLeads;
                calculateKPIs();
                renderLeadsTable();
                closeLeadModal();
            }).addOrUpdateLead(newLead);
        } else {
            // إرسال البيانات للـ Web App الخاص بجوجل عبر الـ API
            if (indexStr !== "") {
                const idx = parseInt(indexStr);
                newLead.rowIndex = leads[idx].rowIndex;
            }

            fetch(webAppUrl, {
                method: "POST",
                body: JSON.stringify({
                    action: "addOrUpdate",
                    lead: newLead
                })
            })
            .then(res => res.json())
            .then(updatedLeads => {
                leads = updatedLeads;
                calculateKPIs();
                renderLeadsTable();
                closeLeadModal();
            })
            .catch(err => {
                console.warn("تنبيه: فشل إرسال البيانات للـ API، سيتم الحفظ محلياً:", err);
                if (indexStr === "") {
                    newLead.created_at = new Date().toISOString().split('T')[0];
                    leads.push(newLead);
                } else {
                    const idx = parseInt(indexStr);
                    leads[idx] = { ...leads[idx], ...newLead };
                }
                localStorage.setItem('meta_crm_leads_minimal', JSON.stringify(leads));
                calculateKPIs();
                renderLeadsTable();
                closeLeadModal();
            });
        }
    }

    function deleteLead(index) {
        if (confirm("هل أنت متأكد من حذف هذا العميل؟")) {
            if (isGoogleAppsScript) {
                // حذف الصف من شيت جوجل مباشرة داخل بيئة جوجل
                const rowIndex = leads[index].rowIndex;
                google.script.run.withSuccessHandler(function(updatedLeads) {
                    leads = updatedLeads;
                    calculateKPIs();
                    renderLeadsTable();
                }).deleteLead(rowIndex);
            } else {
                // حذف الصف عبر الـ Web App API الخارجي
                const rowIndex = leads[index].rowIndex;

                fetch(webAppUrl, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "delete",
                        rowIndex: rowIndex
                    })
                })
                .then(res => res.json())
                .then(updatedLeads => {
                    leads = updatedLeads;
                    calculateKPIs();
                    renderLeadsTable();
                })
                .catch(err => {
                    console.warn("تنبيه: فشل الحذف عبر الـ API، سيتم الحذف محلياً:", err);
                    leads.splice(index, 1);
                    localStorage.setItem('meta_crm_leads_minimal', JSON.stringify(leads));
                    calculateKPIs();
                    renderLeadsTable();
                });
            }
        }
    }

    let funnelChartObj = null;

    function renderCharts() {
        if (funnelChartObj) funnelChartObj.destroy();

        const statuses = ['New Lead', 'Contacted', 'Follow Up Required', 'Appointment Booked', 'Proposal Sent', 'Negotiating', 'Won'];
        const arStatusLabels = ['عميل جديد', 'تم الاتصال', 'يحتاج متابعة', 'مجدول موعد', 'أُرسل العرض', 'تفاوض', 'تم البيع'];
        
        const funnelData = statuses.map(s => leads.filter(l => l.status === s).length);

        const ctxFunnel = document.getElementById('funnelChart').getContext('2d');
        funnelChartObj = new Chart(ctxFunnel, {
            type: 'bar',
            data: {
                labels: arStatusLabels,
                datasets: [{
                    label: 'عدد العملاء',
                    data: funnelData,
                    backgroundColor: '#ffffff',
                    borderColor: '#ffffff',
                    borderWidth: 1,
                    barThickness: 35
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    x: { grid: { display: false }, ticks: { color: '#a3a3a3', font: { family: 'Cairo', size: 12 } } },
                    y: { grid: { color: '#262626' }, ticks: { color: '#a3a3a3', stepSize: 1, font: { family: 'Cairo' } } }
                }
            }
        });
    }

    window.onload = function() {
        initData();
    };
</script>
</body>
</html>
